services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: obras
      POSTGRES_PASSWORD: obras2026
      POSTGRES_DB: obras_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obras -d obras_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api: 
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_DRIVER: postgres
      DB_DSN: host=db user=obras password=obras2026 dbname=obras_db port=5432 sslmode=disable
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
